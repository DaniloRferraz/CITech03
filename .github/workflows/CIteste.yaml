name: CI analytics-service

on:
 workflow_dispatch:

jobs:
  build-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  lint:
    name: Linting
    runs-on: ubuntu-latest
    needs: build-test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint

    - name: Analysing the code with pylint
      run: |
        pylint $(git ls-files '*.py') --fail-under=6   

  Scan-de-Seguranca-SCA:
    name: Scan-de-Seguranca (SCA)
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code.
      uses: actions/checkout@v4

    - name: Software Composition Analysis - Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: '.'
        vuln-type: library
        severity: CRITICAL
        ignore-unfixed: true
        exit-code: 1

  Scan-de-Seguranca-SAST:
    name: Scan-de-Seguranca (SAST)
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code.
      uses: actions/checkout@v4

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
         -Dsonar.projectKey=danilorferraz
         -Dsonar.organization=danilorferraz

  Build-Push-Docker-Image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [Scan-de-Seguranca-SCA, Scan-de-Seguranca-SAST]
    steps:
    - name: Checkout code.
      uses: actions/checkout@v4

    - name: Adicionandos as credenciais AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Construindo imagem Docker
      working-directory: .
      run: |
        docker build -t analytics-service:latest .

    - name: Software Composition Analysis - Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: '.'
        vuln-type: library
        severity: CRITICAL
        ignore-unfixed: true
        exit-code: 1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Push Docker image to Amazon ECR
      run: |
        COMMIT_HASH=$(echo $GITHUB_SHA | cut -c1-7)
        docker push ${{ steps.login-ecr.outputs.registry }}/analytics-service:$COMMIT_HASH

    - name: Logout of Amazon ECR
      if: always()
      run: docker logout ${{ steps.login-ecr.outputs.registry }}