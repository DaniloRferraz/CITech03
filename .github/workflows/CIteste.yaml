name: CI analytics-service

on:
 workflow_dispatch:

jobs:
  build-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  lint:
    name: Linting
    runs-on: ubuntu-latest
    needs: build-test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint

    - name: Analysing the code with pylint
      run: |
        pylint $(git ls-files '*.py') --fail-under=6   

  Scan-de-Seguranca-SCA:
    name: Scan-de-Seguranca (SCA)
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code.
      uses: actions/checkout@v4

    - name: Software Composition Analysis - Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: '.'
        vuln-type: library
        severity: CRITICAL
        ignore-unfixed: true
        exit-code: 1

  Scan-de-Seguranca-SAST:
    name: Scan-de-Seguranca (SAST)
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Checkout code.
      uses: actions/checkout@v4

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
         -Dsonar.projectKey=danilorferraz
         -Dsonar.organization=danilorferraz


